<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; font-weight: 700; color: #1a1f36; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #4a5568; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border 0.2s; }
        input:focus, textarea:focus { border-color: #6c63ff; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #4a5568; }
        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; }
        .btn-primary { background: #6c63ff; color: white; }
        .btn-secondary { background: #f0f4ff; color: #6c63ff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✏️ Edit Task</h1>
        <form method="POST">
            <div class="form-group">
                <label>Task Title</label>
                <input type="text" name="title" value="{{ task.title }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3">{{ task.description or '' }}</textarea>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" name="done" id="done" {{ 'checked' if task.done }} style="width:auto">
                <label for="done">Mark as completed</label>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
